<!DOCTYPE html>
<html>
<head>
  <style>
/* Heavy Theme — Spacegray / Base16 Ocean */

/* ================================================================
   RESET
   ================================================================ */

*,
html {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  background: #2b303b;
}

/* ================================================================
   BODY
   ================================================================ */

body {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 11px;
  color: #c0c5ce;
  background: #2b303b;
  padding: 16px;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ================================================================
   TYPOGRAPHY
   ================================================================ */

h1 {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: #eff1f5;
}

h2 {
  font-size: 10px;
  font-weight: 600;
  color: #65737e;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* ================================================================
   HEADER
   ================================================================ */

.header {
  margin-bottom: 16px;
}

/* ================================================================
   LABELS & FORM GROUPS
   ================================================================ */

label {
  display: block;
  font-size: 10px;
  font-weight: 500;
  color: #65737e;
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.form-group {
  margin-bottom: 16px;
}

/* ================================================================
   INPUTS
   ================================================================ */

input {
  width: 100%;
  padding: 8px 12px;
  font-family: inherit;
  font-size: 11px;
  color: #c0c5ce;
  border: 1px solid #4f5b66;
  border-radius: 3px;
  background: #343d46;
  transition: border-color 0.15s ease, background 0.15s ease;
}

input:focus {
  outline: none;
  border-color: #8fa1b3;
  background: #3d4752;
}

input::placeholder {
  color: #65737e;
}

/* ================================================================
   BUTTONS (Heavy Tabs style)
   ================================================================ */

button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 12px;
  font-family: inherit;
  font-size: 11px;
  font-weight: 500;
  border-radius: 3px;
  border: none;
  cursor: pointer;
  background-color: rgba(255, 255, 255, 0.05);
  color: #c0c5ce;
  transition: background-color 0.15s ease;
}

button:hover:not(:disabled) {
  background-color: rgba(255, 255, 255, 0.1);
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn-primary {
  background-color: #8fa1b3;
  color: #2b303b;
}

.btn-primary:hover:not(:disabled) {
  background-color: #7d91a3;
}

.btn-secondary {
  background-color: rgba(255, 255, 255, 0.05);
  color: #c0c5ce;
}

.btn-secondary:hover:not(:disabled) {
  background-color: rgba(255, 255, 255, 0.1);
}

.btn-danger {
  background-color: rgba(191, 97, 106, 0.15);
  color: #bf616a;
}

.btn-danger:hover:not(:disabled) {
  background-color: rgba(191, 97, 106, 0.25);
}

/* ================================================================
   ICONS (Lucide inline SVG)
   ================================================================ */

button svg {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
}

.btn-primary svg {
  stroke: #2b303b;
}

/* ================================================================
   ACTIONS BAR
   ================================================================ */

.actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

.actions button {
  flex: 1;
}

/* ================================================================
   RESULTS / PREVIEW PANELS
   ================================================================ */

.results,
.preview {
  flex: 1;
  background: #343d46;
  border: 1px solid #4f5b66;
  border-radius: 3px;
  padding: 12px;
  overflow-y: auto;
}

.preview.empty {
  color: #65737e;
  display: flex;
  align-items: center;
  justify-content: center;
}

.preview.error {
  color: #bf616a;
  background: #342b2d;
  border-color: #bf616a;
}

/* ================================================================
   TABLES
   ================================================================ */

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
}

th {
  text-align: left;
  font-weight: 600;
  color: #65737e;
  padding: 6px 8px;
  border-bottom: 1px solid #4f5b66;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

td {
  padding: 6px 8px;
  border-bottom: 1px solid #4f5b66;
  color: #c0c5ce;
}

tr:last-child td {
  border-bottom: none;
}

/* ================================================================
   LISTS
   ================================================================ */

.match-list {
  list-style: none;
  font-size: 11px;
}

.match-list li {
  padding: 4px 0;
  border-bottom: 1px solid #4f5b66;
  color: #c0c5ce;
}

.match-list li:last-child {
  border-bottom: none;
}

/* ================================================================
   STATUS MESSAGES
   ================================================================ */

.status {
  text-align: center;
  font-size: 11px;
  color: #65737e;
  margin-top: 8px;
}

.status:empty {
  display: none;
}

.status.success {
  color: #a3be8c;
}

.status.error {
  color: #bf616a;
}

/* ================================================================
   FILENAME BADGE
   ================================================================ */

.filename {
  font-size: 11px;
  color: #65737e;
  background: #343d46;
  padding: 4px 8px;
  border-radius: 3px;
}

/* ================================================================
   COLOR SWATCHES
   ================================================================ */

.hex-cell {
  display: flex;
  align-items: center;
  gap: 8px;
}

.color-swatch {
  width: 14px;
  height: 14px;
  border-radius: 2px;
  border: 1px solid #4f5b66;
}

/* ================================================================
   SUPPORT LINK
   ================================================================ */

.support-link {
  text-align: center;
  margin-top: 12px;
  font-size: 10px;
}

.support-link a {
  color: #65737e;
  text-decoration: none;
  transition: color 0.15s ease;
}

.support-link a:hover {
  color: #8fa1b3;
}

  </style>
  <style>
    body {
      height: auto;
      min-height: 100vh;
    }

    .specs {
      margin-bottom: 12px;
    }

    .specs table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    .specs td {
      padding: 4px 0;
      border-bottom: 1px solid #4f5b66;
    }

    .specs td:first-child {
      color: #eff1f5;
      font-weight: 500;
    }

    .specs td:last-child {
      text-align: right;
      color: #65737e;
    }

    .specs tr:last-child td {
      border-bottom: none;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group input[type="number"] {
      width: 60px;
      text-align: center;
    }

    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .feedback-link {
      text-align: center;
      margin-top: 8px;
      font-size: 10px;
    }

    .feedback-link a {
      color: #65737e;
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .feedback-link a:hover {
      color: #8fa1b3;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Heavy Publish Prep</h1>
  </div>

  <div class="specs">
    <h2>Figma Community Specs</h2>
    <table>
      <tr><td>Icon</td><td>128 x 128</td></tr>
      <tr><td>Cover Image</td><td>1920 x 960</td></tr>
      <tr><td>Screenshots</td><td>1920 x 960</td></tr>
    </table>
  </div>

  <div class="form-group">
    <div class="form-row">
      <label style="margin-bottom: 0;">Screenshots</label>
      <input type="number" id="screenshot-count" value="2" min="0" max="10">
    </div>
  </div>

  <div class="actions">
    <button class="btn-secondary" id="cancel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>Cancel</button>
    <button class="btn-primary" id="create"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>Create</button>
  </div>

  <div class="support-link">
    <a href="#" id="support-link">Support this plugin &#9829;</a>
  </div>

  <div class="feedback-link">
    <a href="#" id="feedback-link">Send feedback</a>
  </div>

  <script>
    const SUPPORT_URL = 'https://heavy.lemonsqueezy.com';
    const FEEDBACK_URL = 'https://github.com/keithbarney';

    const createBtn = document.getElementById('create');
    const cancelBtn = document.getElementById('cancel');
    const screenshotInput = document.getElementById('screenshot-count');

    function doCreate() {
      const count = parseInt(screenshotInput.value, 10) || 0;
      const clamped = Math.max(0, Math.min(10, count));
      parent.postMessage({ pluginMessage: { type: 'create', screenshotCount: clamped } }, '*');
    }

    createBtn.addEventListener('click', doCreate);

    cancelBtn.addEventListener('click', () => {
      parent.postMessage({ pluginMessage: { type: 'close' } }, '*');
    });

    document.getElementById('support-link').addEventListener('click', (e) => {
      e.preventDefault();
      parent.postMessage({ pluginMessage: { type: 'open-url', url: SUPPORT_URL } }, '*');
    });

    document.getElementById('feedback-link').addEventListener('click', (e) => {
      e.preventDefault();
      parent.postMessage({ pluginMessage: { type: 'open-url', url: FEEDBACK_URL } }, '*');
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.target !== screenshotInput) doCreate();
      if (e.key === 'Escape') cancelBtn.click();
    });

    // Also submit on Enter from the input itself
    screenshotInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        doCreate();
      }
    });
  </script>
</body>
</html>
