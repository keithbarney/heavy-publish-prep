<!DOCTYPE html>
<html>
<head>
  <!-- HEAVY_THEME -->
  <style>
    body {
      height: auto;
      min-height: 100vh;
    }

    .specs {
      margin-bottom: 12px;
    }

    .specs table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    .specs td {
      padding: 4px 0;
      border-bottom: 1px solid #4f5b66;
    }

    .specs td:first-child {
      color: #eff1f5;
      font-weight: 500;
    }

    .specs td:last-child {
      text-align: right;
      color: #65737e;
    }

    .specs tr:last-child td {
      border-bottom: none;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group input[type="number"] {
      width: 60px;
      text-align: center;
    }

    .form-group select {
      width: auto;
      min-width: 140px;
      padding: 6px 8px;
      font-family: inherit;
      font-size: 11px;
      color: #c0c5ce;
      border: 1px solid #4f5b66;
      border-radius: 3px;
      background: #343d46;
    }

    .form-group select:focus {
      outline: none;
      border-color: #8fa1b3;
    }

    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .export-row {
      margin-top: 8px;
    }

    .export-row button {
      width: 100%;
      font-size: 10px;
      padding: 6px 8px;
    }

    .feedback-link {
      text-align: center;
      margin-top: 8px;
      font-size: 10px;
    }

    .feedback-link a {
      color: #65737e;
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .feedback-link a:hover {
      color: #8fa1b3;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Heavy Publish Prep</h1>
  </div>

  <!-- Platform preset -->
  <div class="form-group">
    <div class="form-row">
      <label style="margin-bottom: 0;">Platform</label>
      <select id="preset">
        <option value="figma">Figma Community</option>
        <option value="github">GitHub</option>
      </select>
    </div>
  </div>

  <!-- Dynamic specs -->
  <div class="specs">
    <h2>Asset Specs</h2>
    <table><tbody id="specs-body"></tbody></table>
  </div>

  <!-- Screenshot options (hidden for presets without screenshots) -->
  <div id="screenshot-options">
    <div class="form-group">
      <div class="form-row">
        <label style="margin-bottom: 0;">Screenshots</label>
        <input type="number" id="screenshot-count" value="2" min="0" max="10">
      </div>
    </div>

    <div class="form-group">
      <div class="form-row">
        <label style="margin-bottom: 0;">Template</label>
        <select id="screenshot-template">
          <option value="none">None</option>
          <option value="browser">Browser Mockup</option>
          <option value="centered">Centered + Caption</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn-secondary" id="cancel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>Cancel</button>
    <button class="btn-primary" id="create"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>Create</button>
  </div>

  <!-- Export all -->
  <div class="export-row">
    <button class="btn-secondary" id="export-all"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Select All for Export</button>
  </div>

  <div class="support-link">
    <a href="#" id="support-link">Support this plugin &#9829;</a>
  </div>

  <div class="feedback-link">
    <a href="#" id="feedback-link">Send feedback</a>
  </div>

  <script>
    const SUPPORT_URL = 'https://heavy.lemonsqueezy.com';
    const FEEDBACK_URL = 'https://github.com/keithbarney';

    const PRESET_SPECS = {
      figma: {
        specs: [
          { name: 'Icon', size: '128 \u00d7 128' },
          { name: 'Cover Image', size: '1920 \u00d7 960' },
          { name: 'Screenshots', size: '1920 \u00d7 960' },
        ],
        hasScreenshots: true,
      },
      github: {
        specs: [
          { name: 'Social Preview', size: '1280 \u00d7 640' },
        ],
        hasScreenshots: false,
      },
    };

    const presetSelect = document.getElementById('preset');
    const specsBody = document.getElementById('specs-body');
    const screenshotOptions = document.getElementById('screenshot-options');
    const screenshotInput = document.getElementById('screenshot-count');
    const templateSelect = document.getElementById('screenshot-template');
    const createBtn = document.getElementById('create');
    const cancelBtn = document.getElementById('cancel');
    const exportBtn = document.getElementById('export-all');

    function updatePreset() {
      const config = PRESET_SPECS[presetSelect.value];
      specsBody.innerHTML = config.specs.map(function(s) {
        return '<tr><td>' + s.name + '</td><td>' + s.size + '</td></tr>';
      }).join('');
      screenshotOptions.style.display = config.hasScreenshots ? 'block' : 'none';
    }

    presetSelect.addEventListener('change', updatePreset);
    updatePreset();

    // Handle init message with saved settings
    window.onmessage = function(event) {
      var msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'init') {
        presetSelect.value = msg.preset;
        screenshotInput.value = msg.screenshotCount;
        templateSelect.value = msg.screenshotTemplate;
        updatePreset();
      }
    };

    function doCreate() {
      var count = parseInt(screenshotInput.value, 10) || 0;
      var clamped = Math.max(0, Math.min(10, count));
      parent.postMessage({ pluginMessage: {
        type: 'create',
        screenshotCount: clamped,
        screenshotTemplate: templateSelect.value,
        preset: presetSelect.value,
      } }, '*');
    }

    createBtn.addEventListener('click', doCreate);

    cancelBtn.addEventListener('click', function() {
      parent.postMessage({ pluginMessage: { type: 'close' } }, '*');
    });

    exportBtn.addEventListener('click', function() {
      parent.postMessage({ pluginMessage: { type: 'export-all' } }, '*');
    });

    document.getElementById('support-link').addEventListener('click', function(e) {
      e.preventDefault();
      parent.postMessage({ pluginMessage: { type: 'open-url', url: SUPPORT_URL } }, '*');
    });

    document.getElementById('feedback-link').addEventListener('click', function(e) {
      e.preventDefault();
      parent.postMessage({ pluginMessage: { type: 'open-url', url: FEEDBACK_URL } }, '*');
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') cancelBtn.click();
      if (e.key === 'Enter' && e.target.tagName !== 'SELECT') doCreate();
    });
  </script>
</body>
</html>
