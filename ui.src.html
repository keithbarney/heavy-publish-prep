<!DOCTYPE html>
<html data-theme="dark">
<head>
  <!-- HEAVY_THEME -->
  <style>
    /* Plugin tokens — colors with no HDS equivalent */
    :root {
      --publish-prep-orange: #d08770;
      --publish-prep-blue: #8fa1b3;
    }

    .specs {
      margin-bottom: var(--hds-space-12);
    }

    .specs table {
      width: 100%;
      border-collapse: collapse;
      font-size: var(--hds-font-size-body-xs);
    }

    .specs td {
      padding: var(--hds-space-4) 0;
      border-bottom: 1px solid var(--hds-border-default);
    }

    .specs td:first-child {
      color: var(--hds-text-strong);
      font-weight: 500;
    }

    .specs td:last-child {
      text-align: right;
      color: var(--hds-text-muted);
    }

    .specs tr:last-child td {
      border-bottom: none;
    }

    .form-group {
      margin-bottom: var(--hds-space-12);
    }

    .form-group input[type="number"] {
      width: 60px;
      text-align: center;
    }

    .form-group select {
      width: auto;
      min-width: 140px;
    }

    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .export-row {
      margin-top: var(--hds-space-8);
    }

    .export-row button {
      width: 100%;
      font-size: var(--hds-font-size-body-xs);
      padding: var(--hds-space-4) var(--hds-space-8);
    }

    .upload-group {
      margin-bottom: var(--hds-space-12);
    }

    .upload-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .upload-btn {
      height: 32px;
      padding: 0 var(--hds-space-12);
      font-family: inherit;
      font-size: var(--hds-font-size-body-xs);
      color: var(--hds-text-default);
      background-color: var(--hds-action-secondary-bg-hover);
      border: none;
      border-radius: var(--hds-radius-sm);
      cursor: pointer;
      transition: background-color 100ms ease;
    }

    .upload-btn:hover {
      background-color: var(--hds-action-secondary-bg-hover);
      opacity: 0.8;
    }

    .upload-count {
      font-size: var(--hds-font-size-body-xs);
      color: var(--hds-text-muted);
      margin-top: var(--hds-space-4);
    }

    .toggle-btn {
      height: 32px;
      padding: 0 var(--hds-space-12);
      font-family: inherit;
      font-size: var(--hds-font-size-body-xs);
      color: var(--hds-text-default);
      background-color: var(--hds-action-secondary-bg-hover);
      border: 1px solid transparent;
      border-radius: var(--hds-radius-sm);
      cursor: pointer;
      transition: background-color 100ms ease;
    }

    .toggle-btn:hover {
      background-color: var(--hds-action-secondary-bg-hover);
      opacity: 0.8;
    }

    .toggle-btn.selected {
      background-color: var(--hds-text-muted);
      color: var(--hds-bg-default);
    }

    .toggle-btn.selected:hover {
      background-color: var(--hds-text-muted);
    }
  </style>
</head>
<body>
  <!-- Cover info -->
  <div class="form-group">
    <label>Name</label>
    <input type="text" id="plugin-name" placeholder="My Plugin">
  </div>

  <div class="form-group">
    <label>Description</label>
    <input type="text" id="plugin-description" placeholder="What it does in one line">
  </div>

  <!-- Platform preset -->
  <div class="form-group">
    <div class="form-row">
      <label style="margin-bottom: 0;">Platform</label>
      <select id="preset">
        <option value="figma">Figma Community</option>
        <option value="github">GitHub</option>
      </select>
    </div>
  </div>

  <!-- Dynamic specs -->
  <div class="specs">
    <h2>Asset Specs</h2>
    <table><tbody id="specs-body"></tbody></table>
  </div>

  <!-- Screenshot options (hidden for presets without screenshots) -->
  <div id="screenshot-options">
    <div class="form-group">
      <div class="form-row">
        <label style="margin-bottom: 0;">Screenshots</label>
        <input type="number" id="screenshot-count" value="2" min="0" max="10">
      </div>
    </div>

    <div class="form-group">
      <div class="form-row">
        <label style="margin-bottom: 0;">Template</label>
        <select id="screenshot-template">
          <option value="none">None</option>
          <option value="browser">Browser Mockup</option>
          <option value="centered">Centered + Caption</option>
          <option value="phone">Phone Mockup</option>
          <option value="tablet">Tablet Mockup</option>
        </select>
      </div>
    </div>

    <div class="form-group" id="outline-option" style="display: none;">
      <div class="form-row">
        <label style="margin-bottom: 0;">Outline</label>
        <button type="button" class="toggle-btn selected" id="show-outline" role="checkbox" aria-checked="true">On</button>
      </div>
    </div>

    <div class="upload-group">
      <div class="upload-row">
        <label style="margin-bottom: 0;">Images</label>
        <button type="button" class="upload-btn" id="upload-btn">
          <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Choose files
        </button>
        <input type="file" id="screenshot-files" accept="image/*" multiple style="display: none;">
      </div>
      <div class="upload-count" id="upload-count"></div>
    </div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="hds-btn hds-btn--primary" id="create"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>Create</button>
  </div>

  <!-- Export all -->
  <div class="export-row">
    <button class="hds-btn hds-btn--secondary" id="export-all"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Select All for Export</button>
  </div>

  <div class="support-link">
    <a href="#" id="feedback-link">Feedback</a> · <a href="#" id="support-link">Buy me a coffee <span style="font-size: 14px">&#9749;</span></a> · <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg></button>
  </div>

  <script>
    var FEEDBACK_URL = 'mailto:keithbarneydesign@gmail.com?subject=Heavy Publish Prep Feedback';
    var SUPPORT_URL = 'https://buy.stripe.com/8x2eVfdpYfbW5Rd1Ax87K01';

    const PRESET_SPECS = {
      figma: {
        specs: [
          { name: 'Icon', size: '128 \u00d7 128' },
          { name: 'Cover Image', size: '1920 \u00d7 960' },
          { name: 'Screenshots', size: '1920 \u00d7 960' },
        ],
        hasScreenshots: true,
      },
      github: {
        specs: [
          { name: 'Social Preview', size: '1280 \u00d7 640' },
        ],
        hasScreenshots: false,
      },
    };

    const pluginNameInput = document.getElementById('plugin-name');
    const pluginDescInput = document.getElementById('plugin-description');
    const presetSelect = document.getElementById('preset');
    const specsBody = document.getElementById('specs-body');
    const screenshotOptions = document.getElementById('screenshot-options');
    const screenshotInput = document.getElementById('screenshot-count');
    const templateSelect = document.getElementById('screenshot-template');
    const createBtn = document.getElementById('create');
    const exportBtn = document.getElementById('export-all');
    const uploadBtn = document.getElementById('upload-btn');
    const fileInput = document.getElementById('screenshot-files');
    const uploadCount = document.getElementById('upload-count');
    const outlineOption = document.getElementById('outline-option');
    const outlineBtn = document.getElementById('show-outline');
    var outlineOn = true;

    outlineBtn.addEventListener('click', function() {
      outlineOn = !outlineOn;
      outlineBtn.classList.toggle('selected', outlineOn);
      outlineBtn.setAttribute('aria-checked', String(outlineOn));
      outlineBtn.textContent = outlineOn ? 'On' : 'Off';
    });

    uploadBtn.addEventListener('click', function() { fileInput.click(); });
    fileInput.addEventListener('change', function() {
      var n = fileInput.files.length;
      uploadCount.textContent = n > 0 ? n + ' image' + (n > 1 ? 's' : '') + ' selected' : '';
    });

    function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function updatePreset() {
      const config = PRESET_SPECS[presetSelect.value];
      specsBody.innerHTML = config.specs.map(function(s) {
        return '<tr><td>' + escapeHtml(s.name) + '</td><td>' + escapeHtml(s.size) + '</td></tr>';
      }).join('');
      screenshotOptions.style.display = config.hasScreenshots ? 'block' : 'none';
    }

    function updateTemplateOptions() {
      outlineOption.style.display = templateSelect.value === 'centered' ? 'block' : 'none';
    }

    templateSelect.addEventListener('change', updateTemplateOptions);
    presetSelect.addEventListener('change', function() { updatePreset(); updateTemplateOptions(); });
    updatePreset();
    updateTemplateOptions();

    // Handle init message with saved settings
    window.onmessage = function(event) {
      var msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'init') {
        pluginNameInput.value = msg.pluginName;
        pluginDescInput.value = msg.pluginDescription;
        presetSelect.value = msg.preset;
        screenshotInput.value = msg.screenshotCount;
        templateSelect.value = msg.screenshotTemplate;
        outlineOn = msg.showOutline;
        outlineBtn.classList.toggle('selected', outlineOn);
        outlineBtn.setAttribute('aria-checked', String(outlineOn));
        outlineBtn.textContent = outlineOn ? 'On' : 'Off';
        updatePreset();
        updateTemplateOptions();
      }
    };

    function resizeImageFile(file, maxW, maxH) {
      return new Promise(function(resolve, reject) {
        var img = new Image();
        img.onload = function() {
          var w = img.width;
          var h = img.height;
          if (w > maxW || h > maxH) {
            var scale = Math.min(maxW / w, maxH / h);
            w = Math.round(w * scale);
            h = Math.round(h * scale);
          }
          var canvas = document.createElement('canvas');
          canvas.width = w;
          canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          canvas.toBlob(function(blob) {
            var reader = new FileReader();
            reader.onload = function() { resolve(reader.result); };
            reader.onerror = function() { reject(reader.error); };
            reader.readAsArrayBuffer(blob);
          }, 'image/png');
          URL.revokeObjectURL(img.src);
        };
        img.onerror = function() {
          URL.revokeObjectURL(img.src);
          reject(new Error('Failed to load image'));
        };
        img.src = URL.createObjectURL(file);
      });
    }

    function doCreate() {
      var count = parseInt(screenshotInput.value, 10) || 0;
      var clamped = Math.max(0, Math.min(10, count));
      var files = Array.from(fileInput.files);
      var preset = PRESET_SPECS[presetSelect.value];
      var maxW = preset.hasScreenshots ? 1920 : 1280;
      var maxH = preset.hasScreenshots ? 960 : 640;

      var sendMessage = function(images) {
        var msg = {
          type: 'create',
          pluginName: pluginNameInput.value.trim(),
          pluginDescription: pluginDescInput.value.trim(),
          screenshotCount: clamped,
          screenshotTemplate: templateSelect.value,
          preset: presetSelect.value,
          showOutline: outlineOn,
        };
        if (images && images.length > 0) {
          msg.images = images;
          msg.imageNames = files.map(function(f) {
            return f.name.replace(/\.[^.]+$/, '');
          });
        }
        parent.postMessage({ pluginMessage: msg }, '*');
      };

      if (files.length > 0) {
        Promise.all(files.map(function(f) { return resizeImageFile(f, maxW, maxH); })).then(sendMessage);
      } else {
        sendMessage(null);
      }
    }

    createBtn.addEventListener('click', doCreate);

    exportBtn.addEventListener('click', function() {
      parent.postMessage({ pluginMessage: { type: 'export-all' } }, '*');
    });

    document.getElementById('support-link').addEventListener('click', function(e) {
      e.preventDefault();
      parent.postMessage({ pluginMessage: { type: 'open-url', url: SUPPORT_URL } }, '*');
    });

    document.getElementById('feedback-link').addEventListener('click', function(e) {
      e.preventDefault();
      parent.postMessage({ pluginMessage: { type: 'open-url', url: FEEDBACK_URL } }, '*');
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && e.target.tagName !== 'SELECT' && e.target.tagName !== 'INPUT') doCreate();
    });

    // Theme toggle
    var sunIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>';
    var moonIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>';
    var themeToggle = document.getElementById('theme-toggle');
    try { var savedTheme = localStorage.getItem('heavy-plugin-theme'); } catch(e) { var savedTheme = null; }
    if (savedTheme === 'light') {
      document.documentElement.removeAttribute('data-theme');
      themeToggle.innerHTML = moonIcon;
    } else {
      themeToggle.innerHTML = sunIcon;
    }
    themeToggle.addEventListener('click', function() {
      var isDark = document.documentElement.hasAttribute('data-theme');
      if (isDark) {
        document.documentElement.removeAttribute('data-theme');
        try { localStorage.setItem('heavy-plugin-theme', 'light'); } catch(e) {}
        themeToggle.innerHTML = moonIcon;
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        try { localStorage.removeItem('heavy-plugin-theme'); } catch(e) {}
        themeToggle.innerHTML = sunIcon;
      }
    });

    // Auto-resize to fit content
    new ResizeObserver(function() {
      var h = document.documentElement.scrollHeight;
      parent.postMessage({ pluginMessage: { type: 'resize', height: h } }, '*');
    }).observe(document.body);
  </script>
</body>
</html>
